apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: srv-profile
spec:
  template:
    spec:
      containers:
      - command:
        - profile
        env:
        - name: DLOG
          value: DEBUG
        image: ghcr.io/peg-danielse/hotel-reservations:latest
        name: hotel-reserv-profile
        ports:
          - name: h2c
            containerPort: 8081
        resources:
          requests:
            cpu: 50m
          limits:
            cpu: 500m
