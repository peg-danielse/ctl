apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: srv-user
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
    spec:
      containerConcurrency: 20
      containers:
      - command:
        - user
        env:
        - name: DLOG
          value: DEBUG
        image: ghcr.io/peg-danielse/hotel-reservations:latest
        name: hotel-reserv-user
        ports:
          - name: h2c
            containerPort: 8080
        resources:
          requests:
            cpu: 100m
          limits:
            cpu: 1000m
