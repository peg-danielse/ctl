apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: srv-rate
spec:
  template:
    spec:
      containerConcurrency: 20
      containers:
      - command:
        - rate
        env:
        - name: DLOG
          value: DEBUG
        image: ghcr.io/peg-danielse/hotel-reservations:latest
        name: hotel-reserv-rate
        ports:
          - name: h2c
            containerPort: 8084
        resources:
          requests:
            cpu: 50m
          limits:
            cpu: 500m
