apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: srv-reservation
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/min-scale: "1"
    spec:
      containers:
      - command:
        - reservation
        env:
        - name: DLOG
          value: DEBUG
        image: ghcr.io/peg-danielse/hotel-reservations:latest
        name: hotel-reserv-reservation
        ports:
          - name: h2c
            containerPort: 8087
        resources:
          requests:
            cpu: 50m
          limits:
            cpu: 500m
